name: personal_task_manager
description: "Aplicación diseñada para gestionar tareas diarias con persistencia local"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Gestión de Estado e Inyección de Dependencias (Riverpod 3)
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Inmutabilidad y Generación de Código
  freezed_annotation: ^3.1.0

  # Persistencia Local (Drift)
  drift: ^2.20.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.6


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Generación de código
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.3
  drift_dev: ^2.20.0


flutter:
  uses-material-design: true
